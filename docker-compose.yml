services:
  postgres:
    image: postgres:17-alpine
    container_name: skyrim_postgres
    environment:
      POSTGRES_USER: skyrim_user
      POSTGRES_PASSWORD: skyrim_password
      POSTGRES_DB: skyrim_db
    ports:
      - "5432:5432"
    volumes:
      - ./database:/var/lib/postgresql/data
    command: postgres -c wal_level=logical -c max_wal_senders=1 -c max_replication_slots=1
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: skyrim_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: skyrim_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Configures networking so Kafka can be reached both internally (from Debezium) and externally (if we ran scripts on host)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  debezium:
    image: quay.io/debezium/connect:2.5
    container_name: skyrim_debezium
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
      # We only have one broker, so replication factor must be 1. 
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: skyrim_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - ./data_lake:/data
    restart: unless-stopped

  spark-master:
    image: apache/spark:3.5.0
    container_name: skyrim_spark_master
    environment:
      - SPARK_LOCAL_IP=spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master
    ports:
      - "8080:8080" # Spark Master UI
      - "7077:7077" # Spark Master port
    volumes:
      - ./spark_scripts:/opt/spark/work-dir
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.0
    container_name: skyrim_spark_worker
    environment:
      - SPARK_LOCAL_IP=spark-worker
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      --cores 1
      --memory 1G
      spark://spark-master:7077
    depends_on:
      - spark-master
    volumes:
      - ./spark_scripts:/opt/spark/work-dir
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: skyrim_kafka_ui
    ports:
      - "8090:8080" # Mapping to 8090 because Spark Master uses 8080
    environment:
      KAFKA_CLUSTERS_0_NAME: 'Skyrim Box Kafka'
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka:29092'
      DYNAMIC_CONFIG_ENABLED: 'true'
    depends_on:
      - kafka
    restart: unless-stopped

